<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Drumlab — Score</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%2323262e'/%3E%3Cpath d='M8 24 A 11.3 11.3 0 1 1 24 24' fill='none' stroke='%234ea1ff' stroke-width='3' stroke-linecap='round'/%3E%3Cline x1='16' y1='16' x2='22.5' y2='9.5' stroke='%23d6d9e0' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
<script src="/static/vendor/opensheetmusicdisplay.min.js"></script>
<style>
  body { margin: 0; background: #14161a; color: #d6d9e0; font: 13px/1.45 "Segoe UI", system-ui, sans-serif; }
  header {
    display: flex; align-items: center; gap: 16px; padding: 8px 16px;
    background: #1d2026; border-bottom: 1px solid #2e323b;
  }
  h1 { font-size: 14px; letter-spacing: 2px; margin: 0; color: #4ea1ff; text-transform: uppercase; }
  .hint { color: #8b919e; font-size: 11px; }
  button {
    margin-left: auto; padding: 5px 16px; border-radius: 4px; border: 1px solid #2e323b;
    background: #23262e; color: #d6d9e0; cursor: pointer;
  }
  button:hover { border-color: #4ea1ff; color: #4ea1ff; }
  #status { padding: 24px; text-align: center; color: #8b919e; }
  #status.err { color: #c0463f; }
  #sheet-card {
    background: #ffffff; max-width: 1100px; margin: 18px auto; padding: 24px;
    border-radius: 6px; min-height: 200px;
  }
  @media print {
    header, #status { display: none; }
    body { background: #fff; }
    #sheet-card { margin: 0; padding: 0; border-radius: 0; max-width: none; }
  }
</style>
</head>
<body>
<header>
  <h1>Drumlab &middot; Score</h1>
  <span class="hint" id="grid-info"></span>
  <button onclick="window.print()" title="Print or save as PDF">Print / PDF</button>
</header>
<div id="status">Rendering score &hellip;</div>
<div id="sheet-card"><div id="sheet"></div></div>
<script>
"use strict";
(async () => {
  const status = document.getElementById("status");
  const params = new URLSearchParams(location.search);
  const grid = params.get("grid") || "1/16";
  document.getElementById("grid-info").textContent = "quantization grid: " + grid;
  try {
    const r = await fetch("/api/download/musicxml?grid=" + encodeURIComponent(grid));
    if (!r.ok) {
      let d; try { d = (await r.json()).detail; } catch (e) { d = r.statusText; }
      throw new Error(d);
    }
    const xml = await r.text();
    const osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay("sheet", {
      autoResize: true,
      backend: "svg",
      drawTitle: false,
      drawPartNames: false,
    });
    await osmd.load(xml);
    osmd.render();
    status.style.display = "none";
  } catch (e) {
    status.textContent = "Could not render the score: " + e.message;
    status.className = "err";
  }
})();
</script>
</body>
</html>
